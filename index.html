<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #ededed;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dcdcdc;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 500;
            color: #000;
            flex: 1;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f5f5;
        }
        .message {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .message.bot { flex-direction: row; }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .message.bot .avatar { margin-right: 10px; background: #07c160; color: #fff; }
        .message.user .avatar { margin-left: 10px; background: #07c160; color: #fff; }
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.bot .bubble { background: #fff; border: 1px solid #e5e5e5; color: #000; }
        .message.user .bubble { background: #07c160; color: #fff; }
        .typing {
            display: none;
            padding: 12px 16px;
            background: #f5f5f5;
        }
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #07c160;
            margin-right: 4px;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .quick-actions {
            padding: 8px 16px;
            background: #f5f5f5;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #e5e5e5;
        }
        .quick-btn {
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            color: #07c160;
            cursor: pointer;
        }
        .quick-btn:active { background: #f0f0f0; }
        .input-area {
            display: flex;
            padding: 12px 16px;
            background: #f7f7f7;
            border-top: 1px solid #e5e5e5;
            gap: 8px;
        }
        .input-wrapper { flex: 1; }
        textarea {
            width: 100%;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #07c160; }
        button {
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:active { opacity: 0.8; }
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .welcome h2 { font-size: 20px; margin-bottom: 12px; color: #000; }
        .welcome p { font-size: 15px; line-height: 1.6; }
        .notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            margin: 16px;
            font-size: 14px;
            color: #856404;
        }
        .notice a {
            color: #07c160;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 家庭助手</h1>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>你好呀！👋</h2>
            <p>我是你的家庭智能助手<br>有什么问题都可以问我哦～</p>
        </div>
        <div class="notice">
            💡 <strong>提示：</strong>我的回复会发送到飞书群，<a href="#" onclick="showFeishuLink(); return false;">点击查看</a>
            <div id="feishuLink" style="display:none; margin-top:8px; font-size:13px;">
                飞书链接：<a id="feishuUrl" href="" target="_blank">打开飞书查看回复</a>
            </div>
        </div>
    </div>
    
    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>
    
    <div class="quick-actions" id="quickActions">
        <button class="quick-btn" onclick="sendQuick('你好呀！')">👋 打个招呼</button>
        <button class="quick-btn" onclick="sendQuick('今天天气怎么样？')">🌤️ 查天气</button>
        <button class="quick-btn" onclick="sendQuick('讲个笑话听听')">😄 讲个笑话</button>
        <button class="quick-btn" onclick="sendQuick('你能帮我做什么？')">❓ 你能做什么</button>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="说点什么..." rows="1"></textarea>
        </div>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        
        // 飞书 Webhook 配置
        const FEISHU_WEBHOOK = 'https://open.feishu.cn/open-apis/bot/v2/hook/4fef08ba-c1d1-434d-8c08-ddc519e92143';
        const FEISHU_GROUP_URL = 'https://applink.feishu.cn/client/chat/chatter/add_by_link?link_token=f4ehf062-7bec-43e8-ae69-09513a13a846'; // 替换成你的飞书群链接
        
        // 会话 ID（用于追踪对话）
        let sessionId = sessionStorage.getItem('sessionId') || Date.now().toString();
        sessionStorage.setItem('sessionId', sessionId);
        
        // 消息历史
        let messageHistory = [];
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        function sendQuick(text) {
            messageInput.value = text;
            sendMessage();
        }
        
        function showFeishuLink() {
            document.getElementById('feishuLink').style.display = 'block';
            document.getElementById('feishuUrl').href = FEISHU_GROUP_URL;
        }
        
        function addMessage(text, isUser) {
            const welcome = chatContainer.querySelector('.welcome');
            if (welcome) welcome.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            msgDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 保存到历史
            messageHistory.push({ role: isUser ? 'user' : 'bot', content: text, time: Date.now() });
        }
        
        function showTyping() {
            typing.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            typing.style.display = 'none';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // 显示用户消息
            addMessage(text, true);
            showTyping();
            
            try {
                // 发送到飞书
                const feishuMessage = `[来自家庭网页] [会话:${sessionId}] ${text}`;
                
                const response = await fetch(FEISHU_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        msg_type: 'text',
                        content: {
                            text: feishuMessage
                        }
                    })
                });
                
                const result = await response.json();
                hideTyping();
                
                if (result.code === 0 || result.ok) {
                    // 发送成功，显示提示
                    addMessage('消息已发送到飞书！我会在飞书群里回复你，请打开飞书查看～ 📬', false);
                    
                    // 显示飞书链接
                    setTimeout(() => {
                        showFeishuLink();
                    }, 500);
                } else {
                    addMessage('发送失败，请稍后再试～', false);
                }
            } catch (error) {
                hideTyping();
                addMessage('网络开小差了，请稍后再试～', false);
            }
            
            sendBtn.disabled = false;
            messageInput.focus();
        }
    </script>
</body>
</html>
